<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WM 2026 Live in München</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #1a472a;
      --primary-light: #2d6a4f;
      --accent: #d4a017;
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6c757d;
      --shadow: 0 2px 8px rgba(0,0,0,0.12);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s;
    }

    .icon-btn:hover { background: rgba(255,255,255,0.25); }
    .icon-btn.active { background: var(--accent); color: var(--primary); }

    .filter-bar {
      background: var(--card);
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
      box-shadow: var(--shadow);
      z-index: 999;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--primary-light);
      background: transparent;
      color: var(--primary-light);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    #map {
      flex: 1;
      z-index: 1;
    }

    .venue-count {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow);
      z-index: 1000;
      color: var(--text);
    }

    .refresh-btn {
      position: absolute;
      bottom: 80px;
      right: 16px;
      background: var(--primary);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      box-shadow: var(--shadow);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s;
    }

    .refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Bottom sheet for sources */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 2000;
    }
    .overlay.open { display: block; }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 80dvh;
      background: var(--card);
      border-radius: 16px 16px 0 0;
      z-index: 2001;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #ccc;
      border-radius: 2px;
      margin: 10px auto 6px;
    }

    .sheet-title {
      padding: 4px 16px 12px;
      font-size: 16px;
      font-weight: 700;
      border-bottom: 1px solid #eee;
    }

    .sheet-content {
      padding: 12px 16px;
      overflow-y: auto;
      flex: 1;
    }

    .source-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .source-item .source-info { flex: 1; min-width: 0; }
    .source-item .source-name { font-weight: 600; font-size: 14px; }
    .source-item .source-url { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .toggle {
      width: 44px;
      height: 24px;
      background: #ccc;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--primary); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(20px); }

    .delete-btn {
      background: none;
      border: none;
      color: #dc3545;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }

    .add-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      margin-top: 8px;
    }

    .add-form input {
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .add-form input:focus { border-color: var(--primary); }

    .add-form button {
      padding: 10px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.85);
      z-index: 3000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    .loading-overlay.show { display: flex; }

    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #eee;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Leaflet popup overrides */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: var(--shadow) !important;
    }
    .leaflet-popup-content {
      margin: 12px !important;
      font-size: 13px;
      line-height: 1.4;
    }
    .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: var(--primary); }
    .popup-addr { color: var(--text-muted); margin-bottom: 6px; }
    .popup-details { font-size: 12px; }
    .popup-source { font-size: 11px; color: var(--accent); margin-top: 6px; }

    @media (min-width: 768px) {
      header h1 { font-size: 18px; }
      .filter-btn { font-size: 14px; padding: 8px 18px; }
      .bottom-sheet { max-width: 420px; left: auto; right: 16px; bottom: 16px; border-radius: 16px; max-height: 70vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>&#9917; WM 2026 Live</h1>
    <div class="header-actions">
      <button class="icon-btn" id="btn-sources" title="Datenquellen">&#9881;</button>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">Alle</button>
    <button class="filter-btn" data-filter="today">Heute</button>
    <button class="filter-btn" data-filter="tomorrow">Morgen</button>
    <button class="filter-btn" data-filter="week">Diese Woche</button>
  </div>

  <div id="map"></div>

  <div class="venue-count" id="venue-count"></div>
  <button class="refresh-btn" id="btn-refresh" title="Neu laden">&#8635;</button>

  <div class="overlay" id="overlay"></div>
  <div class="bottom-sheet" id="sheet-sources">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Datenquellen</div>
    <div class="sheet-content">
      <div id="sources-list"></div>
      <div class="add-form">
        <input type="text" id="add-name" placeholder="Name (z.B. muenchen.de)">
        <input type="url" id="add-url" placeholder="URL (https://...)">
        <button id="btn-add-source">+ Quelle hinzufügen</button>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loading">
    <div class="loader"></div>
    <div style="font-weight:600;color:var(--primary)">Lade Venues...</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const MUNICH_CENTER = [48.1351, 11.5820];
    let allVenues = [];
    let markers = [];
    let activeFilter = 'all';

    // WM 2026 schedule (group stage matches, times in CEST)
    const WM_SCHEDULE = [
      { date: '2026-06-11', time: '21:00', teams: 'Mexiko - Südafrika', stage: 'Gruppe' },
      { date: '2026-06-12', time: '18:00', teams: 'Argentinien - Marokko', stage: 'Gruppe' },
      { date: '2026-06-12', time: '21:00', teams: 'England - Senegal', stage: 'Gruppe' },
      { date: '2026-06-13', time: '18:00', teams: 'Brasilien - Japan', stage: 'Gruppe' },
      { date: '2026-06-13', time: '21:00', teams: 'Frankreich - Kolumbien', stage: 'Gruppe' },
      { date: '2026-06-14', time: '18:00', teams: 'Deutschland - Curaçao', stage: 'Gruppe' },
      { date: '2026-06-14', time: '21:00', teams: 'Spanien - Kanada', stage: 'Gruppe' },
      { date: '2026-06-15', time: '15:00', teams: 'Portugal - Ägypten', stage: 'Gruppe' },
      { date: '2026-06-15', time: '18:00', teams: 'Italien - Uruguay', stage: 'Gruppe' },
      { date: '2026-06-15', time: '21:00', teams: 'Niederlande - Australien', stage: 'Gruppe' },
      { date: '2026-06-16', time: '18:00', teams: 'Kroatien - USA', stage: 'Gruppe' },
      { date: '2026-06-16', time: '21:00', teams: 'Belgien - Schweiz', stage: 'Gruppe' },
      { date: '2026-06-17', time: '18:00', teams: 'Dänemark - Serbien', stage: 'Gruppe' },
      { date: '2026-06-17', time: '21:00', teams: 'Deutschland - Schottland', stage: 'Gruppe' },
      { date: '2026-06-18', time: '18:00', teams: 'England - Chile', stage: 'Gruppe' },
      { date: '2026-06-18', time: '21:00', teams: 'Argentinien - Ecuador', stage: 'Gruppe' },
      { date: '2026-06-19', time: '18:00', teams: 'Brasilien - Nigeria', stage: 'Gruppe' },
      { date: '2026-06-19', time: '21:00', teams: 'Frankreich - Mexiko', stage: 'Gruppe' },
      { date: '2026-06-20', time: '21:00', teams: 'Deutschland - Ghana', stage: 'Gruppe' },
      { date: '2026-06-21', time: '18:00', teams: 'Spanien - USA', stage: 'Gruppe' },
      { date: '2026-06-22', time: '18:00', teams: 'Portugal - Südkorea', stage: 'Gruppe' },
      { date: '2026-06-23', time: '21:00', teams: 'Italien - Kamerun', stage: 'Gruppe' },
      { date: '2026-06-24', time: '18:00', teams: 'Niederlande - Mexiko', stage: 'Gruppe' },
      { date: '2026-06-25', time: '21:00', teams: 'Deutschland - Curaçao', stage: 'Gruppe' },
      { date: '2026-06-28', time: '18:00', teams: 'Achtelfinale 1', stage: 'Achtelfinale' },
      { date: '2026-06-29', time: '21:00', teams: 'Achtelfinale 2', stage: 'Achtelfinale' },
      { date: '2026-06-30', time: '18:00', teams: 'Achtelfinale 3', stage: 'Achtelfinale' },
      { date: '2026-07-01', time: '21:00', teams: 'Achtelfinale 4', stage: 'Achtelfinale' },
      { date: '2026-07-04', time: '21:00', teams: 'Viertelfinale 1', stage: 'Viertelfinale' },
      { date: '2026-07-05', time: '21:00', teams: 'Viertelfinale 2', stage: 'Viertelfinale' },
      { date: '2026-07-08', time: '21:00', teams: 'Halbfinale 1', stage: 'Halbfinale' },
      { date: '2026-07-09', time: '21:00', teams: 'Halbfinale 2', stage: 'Halbfinale' },
      { date: '2026-07-11', time: '21:00', teams: 'Spiel um Platz 3', stage: 'Spiel um Platz 3' },
      { date: '2026-07-12', time: '21:00', teams: 'Finale', stage: 'Finale' },
    ];

    function getToday() {
      return new Date().toISOString().split('T')[0];
    }

    function getTomorrow() {
      const d = new Date();
      d.setDate(d.getDate() + 1);
      return d.toISOString().split('T')[0];
    }

    function getWeekEnd() {
      const d = new Date();
      d.setDate(d.getDate() + 7);
      return d.toISOString().split('T')[0];
    }

    function getMatchesForFilter(filter) {
      const today = getToday();
      const tomorrow = getTomorrow();
      const weekEnd = getWeekEnd();

      return WM_SCHEDULE.filter(m => {
        if (filter === 'today') return m.date === today;
        if (filter === 'tomorrow') return m.date === tomorrow;
        if (filter === 'week') return m.date >= today && m.date <= weekEnd;
        return true;
      });
    }

    // Map setup
    const map = L.map('map', { zoomControl: false }).setView(MUNICH_CENTER, 13);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    const venueIcon = L.divIcon({
      className: '',
      html: '<div style="background:#1a472a;width:28px;height:28px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;">&#9917;</div>',
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -16]
    });

    function updateMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const matches = getMatchesForFilter(activeFilter);
      const matchText = matches.length > 0
        ? matches.map(m => `<b>${m.time}</b> ${m.teams} <span style="color:var(--text-muted)">(${m.stage})</span>`).join('<br>')
        : '<em>Keine Spiele in diesem Zeitraum</em>';

      allVenues.forEach(v => {
        const popup = `
          <div class="popup-name">${v.name}</div>
          <div class="popup-addr">${v.address}</div>
          ${matches.length > 0 ? `<div class="popup-details" style="margin-bottom:6px;padding:6px;background:#f0f7f0;border-radius:6px"><b>Spiele:</b><br>${matchText}</div>` : ''}
          <div class="popup-details">${v.details.substring(0, 150)}${v.details.length > 150 ? '...' : ''}</div>
          <div class="popup-source">Quelle: ${v.source}</div>
        `;
        const marker = L.marker([v.lat, v.lng], { icon: venueIcon }).addTo(map).bindPopup(popup, { maxWidth: 280 });
        markers.push(marker);
      });

      const filterLabel = { all: 'Alle', today: 'Heute', tomorrow: 'Morgen', week: 'Diese Woche' }[activeFilter];
      document.getElementById('venue-count').textContent = `${markers.length} Venues · ${filterLabel} · ${matches.length} Spiele`;
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        updateMarkers();
      });
    });

    // Sources sheet
    const overlay = document.getElementById('overlay');
    const sheet = document.getElementById('sheet-sources');

    function openSheet() { overlay.classList.add('open'); sheet.classList.add('open'); }
    function closeSheet() { overlay.classList.remove('open'); sheet.classList.remove('open'); }

    document.getElementById('btn-sources').addEventListener('click', () => {
      loadSourcesList();
      openSheet();
    });
    overlay.addEventListener('click', closeSheet);

    async function loadSourcesList() {
      const res = await fetch('/api/sources');
      const data = await res.json();
      const list = document.getElementById('sources-list');
      list.innerHTML = data.sources.map(s => `
        <div class="source-item">
          <div class="source-info">
            <div class="source-name">${s.name}</div>
            <div class="source-url">${s.url}</div>
          </div>
          <button class="toggle ${s.enabled ? 'on' : ''}" onclick="toggleSource('${s.id}', ${!s.enabled})"></button>
          <button class="delete-btn" onclick="deleteSource('${s.id}')">&#10005;</button>
        </div>
      `).join('');
    }

    window.toggleSource = async (id, enabled) => {
      await fetch(`/api/sources/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ enabled }) });
      loadSourcesList();
    };

    window.deleteSource = async (id) => {
      await fetch(`/api/sources/${id}`, { method: 'DELETE' });
      loadSourcesList();
    };

    document.getElementById('btn-add-source').addEventListener('click', async () => {
      const name = document.getElementById('add-name').value.trim();
      const url = document.getElementById('add-url').value.trim();
      if (!name || !url) return;
      await fetch('/api/sources', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, url }) });
      document.getElementById('add-name').value = '';
      document.getElementById('add-url').value = '';
      loadSourcesList();
    });

    // Load venues
    async function loadVenues(refresh = false) {
      const loading = document.getElementById('loading');
      const btn = document.getElementById('btn-refresh');
      loading.classList.add('show');
      btn.classList.add('spinning');

      try {
        const res = await fetch(`/api/venues${refresh ? '?refresh=1' : ''}`);
        const data = await res.json();
        allVenues = data.venues || [];
        updateMarkers();
        if (allVenues.length > 0) {
          const group = L.featureGroup(markers);
          map.fitBounds(group.getBounds().pad(0.1));
        }
      } catch (e) {
        console.error('Failed to load venues:', e);
      } finally {
        loading.classList.remove('show');
        btn.classList.remove('spinning');
      }
    }

    document.getElementById('btn-refresh').addEventListener('click', () => loadVenues(true));

    loadVenues();
  </script>
</body>
</html>
