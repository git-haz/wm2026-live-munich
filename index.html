<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WM 2026 Live in München</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #1a472a;
      --primary-light: #2d6a4f;
      --accent: #d4a017;
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6c757d;
      --shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      flex-shrink: 0;
    }

    header h1 { font-size: 16px; font-weight: 700; }

    .icon-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.25); }

    .filter-bar {
      background: var(--card);
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
      box-shadow: var(--shadow);
      z-index: 999;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--primary-light);
      background: transparent;
      color: var(--primary-light);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    #map { flex: 1; z-index: 1; }

    .venue-count {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow);
      z-index: 1000;
      color: var(--text);
    }

    /* Info bottom sheet */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 2000;
    }
    .overlay.open { display: block; }

    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 60dvh;
      background: var(--card);
      border-radius: 16px 16px 0 0;
      z-index: 2001;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .bottom-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #ccc;
      border-radius: 2px;
      margin: 10px auto 6px;
    }

    .sheet-title {
      padding: 4px 16px 12px;
      font-size: 16px;
      font-weight: 700;
      border-bottom: 1px solid #eee;
    }

    .sheet-content {
      padding: 12px 16px;
      overflow-y: auto;
      flex: 1;
      font-size: 14px;
      line-height: 1.6;
    }

    .sheet-content dt { font-weight: 600; margin-top: 8px; }
    .sheet-content dd { color: var(--text-muted); margin-bottom: 4px; }
    .sheet-content code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.85);
      z-index: 3000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    .loading-overlay.show { display: flex; }

    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #eee;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .leaflet-popup-content-wrapper { border-radius: 10px !important; box-shadow: var(--shadow) !important; }
    .leaflet-popup-content { margin: 12px !important; font-size: 13px; line-height: 1.4; }
    .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: var(--primary); }
    .popup-addr { color: var(--text-muted); margin-bottom: 6px; }
    .popup-details { font-size: 12px; }
    .popup-source { font-size: 11px; color: var(--accent); margin-top: 6px; }

    @media (min-width: 768px) {
      header h1 { font-size: 18px; }
      .filter-btn { font-size: 14px; padding: 8px 18px; }
      .bottom-sheet { max-width: 420px; left: auto; right: 16px; bottom: 16px; border-radius: 16px; max-height: 70vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>&#9917; WM 2026 Live in München</h1>
    <button class="icon-btn" id="btn-info" title="Info">&#9432;</button>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">Alle</button>
    <button class="filter-btn" data-filter="today">Heute</button>
    <button class="filter-btn" data-filter="tomorrow">Morgen</button>
    <button class="filter-btn" data-filter="week">Diese Woche</button>
  </div>

  <div id="map"></div>
  <div class="venue-count" id="venue-count"></div>

  <div class="overlay" id="overlay"></div>
  <div class="bottom-sheet" id="sheet-info">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Info</div>
    <div class="sheet-content">
      <p>Public-Viewing-Locations zur FIFA WM 2026 in München.</p>
      <dl>
        <dt>Datenquellen</dt>
        <dd>in-muenchen.de, backstage.eu</dd>
        <dt>Letztes Update</dt>
        <dd id="info-updated">–</dd>
        <dt>Venues aktualisieren</dt>
        <dd><code>python update_venues.py</code></dd>
      </dl>
    </div>
  </div>

  <div class="loading-overlay" id="loading">
    <div class="loader"></div>
    <div style="font-weight:600;color:var(--primary)">Lade Venues...</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const MUNICH_CENTER = [48.1351, 11.5820];
    let allVenues = [];
    let markers = [];
    let activeFilter = 'all';

    const WM_SCHEDULE = [
      { date: '2026-06-11', time: '21:00', teams: 'Mexiko - Südafrika', stage: 'Gruppe' },
      { date: '2026-06-12', time: '18:00', teams: 'Argentinien - Marokko', stage: 'Gruppe' },
      { date: '2026-06-12', time: '21:00', teams: 'England - Senegal', stage: 'Gruppe' },
      { date: '2026-06-13', time: '18:00', teams: 'Brasilien - Japan', stage: 'Gruppe' },
      { date: '2026-06-13', time: '21:00', teams: 'Frankreich - Kolumbien', stage: 'Gruppe' },
      { date: '2026-06-14', time: '18:00', teams: 'Deutschland - Curaçao', stage: 'Gruppe' },
      { date: '2026-06-14', time: '21:00', teams: 'Spanien - Kanada', stage: 'Gruppe' },
      { date: '2026-06-15', time: '15:00', teams: 'Portugal - Ägypten', stage: 'Gruppe' },
      { date: '2026-06-15', time: '18:00', teams: 'Italien - Uruguay', stage: 'Gruppe' },
      { date: '2026-06-15', time: '21:00', teams: 'Niederlande - Australien', stage: 'Gruppe' },
      { date: '2026-06-16', time: '18:00', teams: 'Kroatien - USA', stage: 'Gruppe' },
      { date: '2026-06-16', time: '21:00', teams: 'Belgien - Schweiz', stage: 'Gruppe' },
      { date: '2026-06-17', time: '18:00', teams: 'Dänemark - Serbien', stage: 'Gruppe' },
      { date: '2026-06-17', time: '21:00', teams: 'Deutschland - Schottland', stage: 'Gruppe' },
      { date: '2026-06-18', time: '18:00', teams: 'England - Chile', stage: 'Gruppe' },
      { date: '2026-06-18', time: '21:00', teams: 'Argentinien - Ecuador', stage: 'Gruppe' },
      { date: '2026-06-19', time: '18:00', teams: 'Brasilien - Nigeria', stage: 'Gruppe' },
      { date: '2026-06-19', time: '21:00', teams: 'Frankreich - Mexiko', stage: 'Gruppe' },
      { date: '2026-06-20', time: '21:00', teams: 'Deutschland - Ghana', stage: 'Gruppe' },
      { date: '2026-06-21', time: '18:00', teams: 'Spanien - USA', stage: 'Gruppe' },
      { date: '2026-06-22', time: '18:00', teams: 'Portugal - Südkorea', stage: 'Gruppe' },
      { date: '2026-06-23', time: '21:00', teams: 'Italien - Kamerun', stage: 'Gruppe' },
      { date: '2026-06-24', time: '18:00', teams: 'Niederlande - Mexiko', stage: 'Gruppe' },
      { date: '2026-06-25', time: '21:00', teams: 'Deutschland - Curaçao', stage: 'Gruppe' },
      { date: '2026-06-28', time: '18:00', teams: 'Achtelfinale 1', stage: 'Achtelfinale' },
      { date: '2026-06-29', time: '21:00', teams: 'Achtelfinale 2', stage: 'Achtelfinale' },
      { date: '2026-06-30', time: '18:00', teams: 'Achtelfinale 3', stage: 'Achtelfinale' },
      { date: '2026-07-01', time: '21:00', teams: 'Achtelfinale 4', stage: 'Achtelfinale' },
      { date: '2026-07-04', time: '21:00', teams: 'Viertelfinale 1', stage: 'Viertelfinale' },
      { date: '2026-07-05', time: '21:00', teams: 'Viertelfinale 2', stage: 'Viertelfinale' },
      { date: '2026-07-08', time: '21:00', teams: 'Halbfinale 1', stage: 'Halbfinale' },
      { date: '2026-07-09', time: '21:00', teams: 'Halbfinale 2', stage: 'Halbfinale' },
      { date: '2026-07-11', time: '21:00', teams: 'Spiel um Platz 3', stage: 'Spiel um Platz 3' },
      { date: '2026-07-12', time: '21:00', teams: 'Finale', stage: 'Finale' },
    ];

    function getToday() { return new Date().toISOString().split('T')[0]; }
    function getTomorrow() { const d = new Date(); d.setDate(d.getDate() + 1); return d.toISOString().split('T')[0]; }
    function getWeekEnd() { const d = new Date(); d.setDate(d.getDate() + 7); return d.toISOString().split('T')[0]; }

    function getMatchesForFilter(filter) {
      const today = getToday(), tomorrow = getTomorrow(), weekEnd = getWeekEnd();
      return WM_SCHEDULE.filter(m => {
        if (filter === 'today') return m.date === today;
        if (filter === 'tomorrow') return m.date === tomorrow;
        if (filter === 'week') return m.date >= today && m.date <= weekEnd;
        return true;
      });
    }

    const map = L.map('map', { zoomControl: false }).setView(MUNICH_CENTER, 13);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    const venueIcon = L.divIcon({
      className: '',
      html: '<div style="background:#1a472a;width:28px;height:28px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;">&#9917;</div>',
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -16]
    });

    function updateMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const matches = getMatchesForFilter(activeFilter);
      const matchText = matches.length > 0
        ? matches.map(m => `<b>${m.time}</b> ${m.teams} <span style="color:var(--text-muted)">(${m.stage})</span>`).join('<br>')
        : '<em>Keine Spiele in diesem Zeitraum</em>';

      allVenues.forEach(v => {
        const popup = `
          <div class="popup-name">${v.name}</div>
          <div class="popup-addr">${v.address}</div>
          ${matches.length > 0 ? `<div class="popup-details" style="margin-bottom:6px;padding:6px;background:#f0f7f0;border-radius:6px"><b>Spiele:</b><br>${matchText}</div>` : ''}
          <div class="popup-details">${v.details.substring(0, 150)}${v.details.length > 150 ? '...' : ''}</div>
          <div class="popup-source">Quelle: ${v.source}</div>
        `;
        markers.push(L.marker([v.lat, v.lng], { icon: venueIcon }).addTo(map).bindPopup(popup, { maxWidth: 280 }));
      });

      const filterLabel = { all: 'Alle', today: 'Heute', tomorrow: 'Morgen', week: 'Diese Woche' }[activeFilter];
      document.getElementById('venue-count').textContent = `${markers.length} Venues · ${filterLabel} · ${matches.length} Spiele`;
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        updateMarkers();
      });
    });

    // Info sheet
    const overlay = document.getElementById('overlay');
    const sheet = document.getElementById('sheet-info');
    document.getElementById('btn-info').addEventListener('click', () => { overlay.classList.add('open'); sheet.classList.add('open'); });
    overlay.addEventListener('click', () => { overlay.classList.remove('open'); sheet.classList.remove('open'); });

    // Load static venues.json
    async function loadVenues() {
      const loading = document.getElementById('loading');
      loading.classList.add('show');
      try {
        const res = await fetch('venues.json');
        const data = await res.json();
        allVenues = data.venues || [];
        if (data.updated) document.getElementById('info-updated').textContent = data.updated;
        updateMarkers();
        if (allVenues.length > 0) {
          map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));
        }
      } catch (e) {
        document.getElementById('venue-count').textContent = 'Fehler beim Laden der Venues';
        console.error('Failed to load venues.json:', e);
      } finally {
        loading.classList.remove('show');
      }
    }

    loadVenues();
  </script>
</body>
</html>
